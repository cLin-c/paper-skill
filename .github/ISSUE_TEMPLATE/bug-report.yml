name: Bug report
description: Report unclear, unsafe, or incorrect paper-skill behavior.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: prompt
    attributes:
      label: Prompt or workflow
      description: What did you ask paper-skill to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: checkboxes
    id: risk
    attributes:
      label: Risk type
      options:
        - label: Invented data or experiment
        - label: Invented citation, DOI, or journal policy
        - label: Over-claimed beyond provided evidence
        - label: Changed scientific meaning
        - label: Poor English or Chinglish remains
        - label: Other
