name: toolchain

on:
  push:
  pull_request:

jobs:
  paper-skill-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run sample stage gate
        run: python tools/paper_skill_gate.py examples/submission-package-check.json
