<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Chinese materials to English submission package workflow</title>
  <desc id="desc">A visual workflow showing Chinese research materials becoming an English submission package through paper-skill modules.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbfc; }
      .title { font: 700 32px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #5a6678; }
      .stage-title { font: 700 19px Arial, sans-serif; fill: #172033; }
      .stage-text { font: 400 13px Arial, sans-serif; fill: #536174; }
      .chip { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #9aa8b8; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .icon { stroke: #172033; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9aa8b8"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="500"/>
  <text class="title" x="60" y="58">Chinese Research Materials -> English Submission Package</text>
  <text class="subtitle" x="60" y="88">A submission-first workflow for authors who draft in Chinese and submit in English.</text>

  <g transform="translate(60,150)">
    <rect width="230" height="190" rx="8" fill="#ffffff" stroke="#d9e0e8"/>
    <rect width="230" height="38" rx="8" fill="#2f80ed"/>
    <text class="chip" x="115" y="25" text-anchor="middle">INPUT</text>
    <path class="icon" d="M42 70 h54 M42 92 h74 M42 114 h44 M42 136 h64"/>
    <text class="stage-title" x="35" y="165">Chinese materials</text>
    <text class="stage-text" x="35" y="185">draft, thesis, notes, tables</text>
  </g>

  <path class="arrow" d="M310 245 H400"/>

  <g transform="translate(420,120)">
    <rect width="360" height="250" rx="8" fill="#ffffff" stroke="#d9e0e8"/>
    <rect width="360" height="38" rx="8" fill="#172033"/>
    <text class="chip" x="180" y="25" text-anchor="middle">PAPER-SKILL MODULES</text>
    <g transform="translate(35,64)">
      <rect width="135" height="36" rx="6" fill="#e8f1ff" stroke="#b7d3ff"/>
      <text class="stage-text" x="68" y="23" text-anchor="middle">writing</text>
    </g>
    <g transform="translate(190,64)">
      <rect width="135" height="36" rx="6" fill="#ffecec" stroke="#ffc4c4"/>
      <text class="stage-text" x="68" y="23" text-anchor="middle">translation</text>
    </g>
    <g transform="translate(35,115)">
      <rect width="135" height="36" rx="6" fill="#f2ecff" stroke="#d3c2ff"/>
      <text class="stage-text" x="68" y="23" text-anchor="middle">review-response</text>
    </g>
    <g transform="translate(190,115)">
      <rect width="135" height="36" rx="6" fill="#ebfbf6" stroke="#b5ead9"/>
      <text class="stage-text" x="68" y="23" text-anchor="middle">quality-gates</text>
    </g>
    <g transform="translate(35,166)">
      <rect width="135" height="36" rx="6" fill="#fff6e5" stroke="#ffd994"/>
      <text class="stage-text" x="68" y="23" text-anchor="middle">figures</text>
    </g>
    <g transform="translate(190,166)">
      <rect width="135" height="36" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
      <text class="stage-text" x="68" y="23" text-anchor="middle">citation-integrity</text>
    </g>
  </g>

  <path class="arrow" d="M800 245 H890"/>

  <g transform="translate(910,150)">
    <rect width="230" height="190" rx="8" fill="#ffffff" stroke="#d9e0e8"/>
    <rect width="230" height="38" rx="8" fill="#059669"/>
    <text class="chip" x="115" y="25" text-anchor="middle">OUTPUT</text>
    <path class="icon" d="M42 72 h72 M42 94 h58 M42 116 h72 M42 138 h46 M102 138 l12 12 l26-34"/>
    <text class="stage-title" x="35" y="165">Submission package</text>
    <text class="stage-text" x="35" y="185">abstract, cover letter, checks</text>
  </g>

  <g transform="translate(220,405)">
    <rect width="760" height="46" rx="8" fill="#172033"/>
    <text class="chip" x="380" y="29" text-anchor="middle">No fabricated experiments · No invented DOI · Missing facts stay visible</text>
  </g>
</svg>
